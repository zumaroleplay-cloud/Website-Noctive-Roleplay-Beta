<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOCTIVE ROLEPLAY | Official Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary: #0056b3; --accent: #ffcc00; --danger: #e74c3c;
            --card-bg: rgba(255, 255, 255, 0.95); --radius: 12px;
        }
        #galaxy-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at bottom, #001d3d 0%, #000814 100%); }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: #2d3436; overflow-x: hidden; min-height: 100vh; }
        header { background: rgba(0, 86, 179, 0.9); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.5); }
        .logo-text { font-family: 'Montserrat'; color: var(--accent); font-weight: bold; font-size: 18px; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 5px; padding: 5px; }
        .menu-btn span { display: block; width: 22px; height: 3px; background: var(--accent); }
        .user-profile img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); }
        nav { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: white; transition: 0.4s; z-index: 2001; box-shadow: 5px 0 25px rgba(0,0,0,0.1); overflow-y: auto; }
        nav.open { left: 0; }
        .nav-header { padding: 30px; background: var(--accent); color: var(--primary); text-align: center; }
        nav button { width: 100%; background: transparent; border: none; padding: 15px 25px; text-align: left; cursor: pointer; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 10px; font-size: 16px; }
        .container { width: 100%; max-width: 800px; margin: 20px auto; padding: 0 15px; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--card-bg); border-radius: var(--radius); padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-bottom: 20px; border-top: 4px solid var(--accent); }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 8px; color: var(--primary); font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); opacity: 0.8; }
        textarea, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; font-size: 16px; }
        .chat-container { height: 250px; overflow-y: auto; background: #f8f9fa; border-radius: 8px; padding: 10px; border: 1px solid #ddd; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .chat-bubble { background: white; padding: 8px 12px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); max-width: 85%; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; }
    </style>
</head>
<body>

<canvas id="galaxy-bg"></canvas>

<div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000814; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="color:var(--accent); font-family:Montserrat;">NOCTIVE RP</h1>
    <div id="g_id_onload" data-client_id="94819907264-i5n030757j60pmjqg9ogk50f41pbokqe.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
    <div class="g_id_signin" data-type="standard"></div>
</div>

<header>
    <div class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="logo-text">NOCTIVE RP</div>
    <div class="user-profile"><img id="user-photo" src="" alt=""></div>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav id="sidebar">
    <div class="nav-header"><h3>MENU</h3><p id="player-ic-display">Citizen</p></div>
    <button onclick="showPage('home')"><i class="fas fa-home"></i> HOME</button>
    <button onclick="showPage('wl-page')"><i class="fas fa-id-card"></i> WHITELIST</button>
    <button onclick="showPage('cs-page')"><i class="fas fa-book"></i> CHAR STORY</button>
    <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
</nav>

<div class="container">
    <div id="page-home" class="page active">
        <div class="card"><h3>PENGUMUMAN</h3><p id="home-pengumuman">Memuat...</p></div>
        <div class="card">
            <h3>CHAT WARGA</h3>
            <div class="chat-container" id="chat-box"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="chat-input" placeholder="Ketik pesan...">
                <button class="btn-main" onclick="sendChat()" style="width:80px;">KIRIM</button>
            </div>
        </div>
    </div>

    <div id="page-wl-page" class="page">
        <div class="card">
            <h2>WHITELIST FORM</h2>
            <div id="wl-form">
                <input type="text" id="wl-name" placeholder="Nama_Lengkap">
                <textarea id="wl-reason" placeholder="Alasan bermain di Noctive RP..."></textarea>
                <button class="btn-main" onclick="submitWL()">KIRIM WHITELIST</button>
            </div>
            <div id="wl-status" style="display:none; text-align:center;">
                <h3 id="wl-status-text"></h3>
                <p id="wl-msg-box" style="background:#eee; padding:10px; border-radius:5px;"></p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyByycnIfy96jZ3mGyc5jaPp9I0BN5FzITY",
      authDomain: "website-noctivee.firebaseapp.com",
      databaseURL: "https://website-noctivee-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "website-noctivee",
      storageBucket: "website-noctivee.firebasestorage.app",
      messagingSenderId: "655473344127",
      appId: "1:655473344127:web:0c307cbfaf86804fb4894a"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    window.db = { users: {}, chats: [], content: { pengumuman: "Selamat Datang!" } };
    let currentUser = JSON.parse(localStorage.getItem('noctive_session')) || null;

    onValue(ref(database, 'server_data'), (snapshot) => {
        const data = snapshot.val();
        if (data) { window.db = data; updateUI(); }
    });

    window.saveDB = function() {
        set(ref(database, 'server_data'), window.db)
        .then(() => { alert("Data Berhasil Terkirim!"); })
        .catch(e => { alert("Gagal! Pastikan Rules Firebase sudah PUBLISH."); });
    };

    window.handleCredentialResponse = function(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = payload;
        localStorage.setItem('noctive_session', JSON.stringify(currentUser));
        const key = currentUser.email.replace(/\./g, ',');
        if (!window.db.users[key]) {
            window.db.users[key] = { email: currentUser.email, name: currentUser.name, wl: 'NONE' };
            window.saveDB();
        }
        location.reload();
    };

    window.submitWL = function() {
        const n = document.getElementById('wl-name').value;
        const r = document.getElementById('wl-reason').value;
        if(!n || !r) return alert("Isi semua data!");
        const key = currentUser.email.replace(/\./g, ',');
        window.db.users[key].ic_name = n;
        window.db.users[key].wl = 'PROSES';
        window.db.users[key].wl_reason = r;
        window.saveDB();
    };

    window.sendChat = function() {
        const m = document.getElementById('chat-input').value;
        if(!m || !currentUser) return;
        const key = currentUser.email.replace(/\./g, ',');
        const u = window.db.users[key];
        if(!window.db.chats) window.db.chats = [];
        window.db.chats.push({ name: u.ic_name || currentUser.name, text: m });
        if(window.db.chats.length > 20) window.db.chats.shift();
        document.getElementById('chat-input').value = "";
        window.saveDB();
    };

    window.logout = function() { localStorage.clear(); location.reload(); };
    window.toggleMenu = function() { const s = document.getElementById('sidebar'); s.classList.toggle('open'); document.getElementById('overlay').style.display = s.classList.contains('open') ? 'block' : 'none'; };
    window.showPage = function(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-' + id).classList.add('active'); window.toggleMenu(); };

    function updateUI() {
        if(!currentUser) return;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('user-photo').src = currentUser.picture;
        const key = currentUser.email.replace(/\./g, ',');
        const u = window.db.users[key];

        document.getElementById('home-pengumuman').innerText = window.db.content.pengumuman;
        const cb = document.getElementById('chat-box');
        if(window.db.chats) cb.innerHTML = window.db.chats.map(c => `<div class="chat-bubble"><b>${c.name}</b><p>${c.text}</p></div>`).join('');
        cb.scrollTop = cb.scrollHeight;

        if(u && u.wl !== 'NONE') {
            document.getElementById('wl-form').style.display = 'none';
            document.getElementById('wl-status').style.display = 'block';
            document.getElementById('wl-status-text').innerText = "Status: " + u.wl;
            document.getElementById('wl-msg-box').innerText = u.wl_msg || "Sedang ditinjau Staff...";
        }
    }

    // Background Animasi
    const cvs = document.getElementById('galaxy-bg'); const cx = cvs.getContext('2d'); let sts = [];
    function init() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; sts = []; for(let i=0; i<50; i++) sts.push({x:Math.random()*cvs.width, y:Math.random()*cvs.height, r:Math.random()*1.5}); }
    function anim() { cx.clearRect(0,0,cvs.width,cvs.height); cx.fillStyle = "white"; sts.forEach(s => { cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, Math.PI*2); cx.fill(); s.y -= 0.1; if(s.y < 0) s.y = cvs.height; }); requestAnimationFrame(anim); }
    init(); anim();
</script>
</body>
</html>
